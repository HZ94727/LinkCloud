name: Go Build

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    container: docker.io/gitea/act_runner:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go
        run: |
          wget -q https://golang.google.cn/dl/go1.26.1.linux-amd64.tar.gz
          tar -C /usr/local -xzf go1.26.1.linux-amd64.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          go version
          go env -w GOPROXY=https://goproxy.cn,direct
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o linkcloud .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkcloud-linux
          path: linkcloud