name: Go Build

on:
  push:
    branches: [main, master]

jobs:
  build:
    # 1. 使用已经下载好的、包含 node 和 git 的完整镜像
    runs-on: ubuntu-latest
    container: docker.io/catthehacker/ubuntu:act-latest

    steps:
      # 2. Checkout 现在可以正常运行了
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. 直接使用镜像里预装的 Go 进行编译
      - name: Build
        run: |
          go version
          go env -w GOPROXY=https://goproxy.cn,direct
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o linkcloud .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkcloud-linux
          path: linkcloud