name: Go Build

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    container: docker.io/gitea/act_runner:latest

    steps:
      # 1. 【关键修改】手动克隆代码，替代 actions/checkout
      - name: Checkout code manually
        run: |
          # 克隆你的仓库到容器中
          # 注意：这里需要你的仓库是公开的，或者容器能访问到你的 Gitea 实例
          git clone --branch ${{ gitea.ref_name }} http://192.168.10.18:3000/LinkCloud/LinkCloud-BackEnd.git .
          ls -la

      - name: Install Go
        run: |
          wget -q https://golang.google.cn/dl/go1.26.1.linux-amd64.tar.gz
          tar -C /usr/local -xzf go1.26.1.linux-amd64.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          go version
          go env -w GOPROXY=https://goproxy.cn,direct
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o linkcloud .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkcloud-linux
          path: linkcloud