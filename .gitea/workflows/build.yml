name: linkcloud-ci-cd

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linkcloud-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.1"
  CGO_ENABLED: "0"
  APP_DIR: LinkCloud
  BINARY_NAME: linkcloud

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./LinkCloud

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: LinkCloud/go.sum

      - name: Print Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build -trimpath -ldflags "-s -w" -o "${BINARY_NAME}" .
