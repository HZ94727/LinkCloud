name: Go Build

on:
  push:
    branches: [main, master]

jobs:
  build:
    # 直接使用官方 Go 镜像，里面已经包含了 go 命令
    runs-on: ubuntu-latest
    container: docker.io/golang:1.26.1
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: |
          # 设置 Go 模块代理为国内源
          go env -w GOPROXY=https://goproxy.cn,direct
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o linkcloud .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkcloud-linux
          path: linkcloud