name: Go Build

on:
  push:
    branches: [main, master]

# 添加这一块，指定容器镜像使用 Docker Hub
defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04  # 使用 Docker Hub 的 Ubuntu 镜像，会走你的镜像加速
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26.1"
      
      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOAMD64=v3 go build -o linkcloud .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkcloud-linux
          path: linkcloud