<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px;">
        <h2 style="color: #1a73e8;">LinkCloud</h2>
        <p>您好，</p>
        <p>我们收到了您重置密码的请求。请点击下面的按钮重置您的密码：</p>
        <div style="text-align: center; margin: 30px 0;">
            <a href="{{.ResetURL}}" style="background-color: #1a73e8; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; display: inline-block;">
                重置密码
            </a>
        </div>
        <p style="color: #666;">如果按钮无法点击，请复制以下链接到浏览器：</p>
        <p style="background-color: #f5f5f5; padding: 10px; border-radius: 4px; word-break: break-all;">{{.ResetURL}}</p>
        <hr style="border: none; border-top: 1px solid #e0e0e0;">
        <p style="color: #999; font-size: 12px;">© 2026 LinkCloud 短链云</p>
    </div>
</body>
</html>
