<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - LinkCloud</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            /* background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 30px;
        }
        
        h1 {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #1a73e8;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #1557b0;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        
        .message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">LinkCloud</div>
        <h1>重置密码</h1>
        <div class="subtitle">请设置您的新密码</div>
        
        <div id="message" class="message"></div>
        
        <form id="resetForm">
            <input type="hidden" id="token">
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="password" placeholder="请输入新密码（至少6位）" required>
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
            </div>
            <button type="submit" id="submitBtn">确认重置</button>
        </form>
    </div>
    
    <script>
        // 获取 URL 参数中的 token
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        const messageDiv = document.getElementById('message');
        const resetForm = document.getElementById('resetForm');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        
        // 设置 token
        if (token) {
            document.getElementById('token').value = token;
        } else {
            showMessage('链接无效，缺少 token', 'error');
            submitBtn.disabled = true;
        }
        
        // 表单提交
        resetForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            
            // 前端校验
            if (password.length < 6) {
                showMessage('密码长度至少6位', 'error');
                return;
            }
            
            if (password !== confirm) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }
            
            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            
            try {
                const response = await fetch('/api/v1/auth/reset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        new_password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.code === 0) {
                    showMessage('密码重置成功！', 'success');
                    // 清空表单
                    passwordInput.value = '';
                    confirmInput.value = '';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '确认重置';
                } else {
                    showMessage(data.message || '重置失败，请重试', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '确认重置';
                }
            } catch (error) {
                showMessage('网络错误，请重试', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '确认重置';
            }
        });
        
        function showMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
