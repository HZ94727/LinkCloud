<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>输入访问密码 - LinkCloud</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f6f8ff 0%, #eef2ff 100%);
            color: #1f2937;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
            border: 1px solid rgba(148, 163, 184, 0.18);
            padding: 36px 32px 32px;
        }

        .brand {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #2563eb;
            margin-bottom: 18px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
            color: #64748b;
            margin-bottom: 28px;
        }

        .message {
            display: none;
            margin-bottom: 20px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
        }

        .message.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
        }

        .message.info {
            display: block;
            background: #dbeafe;
            color: #1d4ed8;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
        }

        input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: #fff;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 14px 16px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .hint {
            margin-top: 16px;
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">LinkCloud</div>
        <h1>输入访问密码</h1>
        <div class="subtitle">该短链接需要密码访问，请先输入密码后继续跳转。</div>

        <div id="message" class="message info">正在准备访问受保护的短链接。</div>

        <form id="passwordForm" autocomplete="off">
            <div class="field">
                <label for="password">访问密码</label>
                <input id="password" type="password" placeholder="请输入访问密码" required>
            </div>
            <button type="submit" id="submitBtn">继续访问</button>
        </form>

        <div class="hint">若密码正确，系统会自动跳转到原始链接。</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const shortCode = params.get('short_code');

        const message = document.getElementById('message');
        const form = document.getElementById('passwordForm');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');

        function showError(text) {
            message.textContent = text;
            message.className = 'message error';
        }

        if (!shortCode) {
            showError('链接无效，缺少短码。');
            submitBtn.disabled = true;
        }

        form.addEventListener('submit', function (event) {
            event.preventDefault();

            const password = passwordInput.value.trim();
            if (!password) {
                showError('请输入访问密码。');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '验证中...';

            window.location.href = '/s/' + encodeURIComponent(shortCode) + '?password=' + encodeURIComponent(password);
        });
    </script>
</body>
</html>
